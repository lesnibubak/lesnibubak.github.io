<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Snake Game</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #1a1a1a;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        #game-container {
            border: 2px solid #00ff00;
            padding: 10px;
            background-color: #000;
            line-height: 1.2;
            white-space: pre;
            font-size: 14px;
        }
        
        #stats {
            margin-top: 20px;
            text-align: center;
            min-height: 100px;
        }
        
        #body-display {
            margin-top: 10px;
            font-size: 12px;
        }
        
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #00ff00;
            color: #000;
            border: none;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }
        
        button:hover {
            background-color: #00cc00;
        }
        
        .game-over {
            color: #ff0000;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>🐍 ASCII Snake Game</h1>
    <div id="game-container"></div>
    <div id="stats">
        <div>Score: <span id="score">0</span></div>
        <div>Segments Cleared: <span id="cleared">0</span></div>
        <div id="body-display">Body: (empty)</div>
        <div id="status"></div>
    </div>
    <button onclick="initGame()">New Game</button>

    <script>
        const WIDTH = 40;
        const HEIGHT = 20;
        const GAME_SPEED = 100;

        let snake = [{x: WIDTH / 2, y: HEIGHT / 2}];
        let body = [];
        let foods = [];
        let direction = {x: 1, y: 0};
        let nextDirection = {x: 1, y: 0};
        let score = 0;
        let cleared = 0;
        let gameActive = true;
        let gameOver = false;

        function initGame() {
            snake = [{x: Math.floor(WIDTH / 2), y: Math.floor(HEIGHT / 2)}];
            body = [];
            direction = {x: 1, y: 0};
            nextDirection = {x: 1, y: 0};
            score = 0;
            cleared = 0;
            gameActive = true;
            gameOver = false;
            foods = [];
            spawnFoods();
            document.getElementById('status').innerHTML = '';
            gameLoop();
        }

        function spawnFoods() {
            while (foods.length < 3) {
                let x = Math.floor(Math.random() * WIDTH);
                let y = Math.floor(Math.random() * HEIGHT);
                
                // Check if position is not occupied
                if (!isOccupied(x, y)) {
                    let letter = String.fromCharCode(65 + Math.floor(Math.random() * 26)); // A-Z
                    foods.push({x, y, letter});
                }
            }
        }

        function isOccupied(x, y) {
            // Check snake head
            if (snake[0].x === x && snake[0].y === y) return true;
            
            // Check snake body
            for (let segment of body) {
                if (segment.x === x && segment.y === y) return true;
            }
            
            // Check existing foods
            for (let food of foods) {
                if (food.x === x && food.y === y) return true;
            }
            
            return false;
        }

        function update() {
            if (!gameActive) return;

            direction = nextDirection;

            // Move head
            let newHead = {
                x: (snake[0].x + direction.x + WIDTH) % WIDTH,
                y: (snake[0].y + direction.y + HEIGHT) % HEIGHT
            };

            // Check collision with body
            for (let segment of body) {
                if (newHead.x === segment.x && newHead.y === segment.y) {
                    endGame("You crashed into yourself!");
                    return;
                }
            }

            snake.unshift(newHead);

            // Check food collision
            let foodEaten = false;
            for (let i = 0; i < foods.length; i++) {
                if (newHead.x === foods[i].x && newHead.y === foods[i].y) {
                    let letter = foods[i].letter;
                    body.push(letter);
                    score++;
                    
                    // Check for 3 in a row
                    let count = body.filter(l => l === letter).length;
                    if (count === 3) {
                        body = body.filter(l => l !== letter);
                        cleared++;
                    }
                    
                    foods.splice(i, 1);
                    spawnFoods();
                    foodEaten = true;
                    break;
                }
            }

            // Remove tail if no food eaten
            if (!foodEaten) {
                snake.pop();
            }

            render();
        }

        function endGame(message) {
            gameActive = false;
            gameOver = true;
            document.getElementById('status').innerHTML = `<div class="game-over">${message}</div>`;
        }

        function render() {
            let grid = Array(HEIGHT).fill(0).map(() => Array(WIDTH).fill(' '));

            // Draw foods
            for (let food of foods) {
                grid[food.y][food.x] = food.letter;
            }

            // Draw body
            for (let segment of body) {
                for (let i = 0; i < WIDTH; i++) {
                    for (let j = 0; j < HEIGHT; j++) {
                        if (grid[j][i] === segment) {
                            grid[j][i] = '*';
                            break;
                        }
                    }
                }
            }

            // Draw snake (but not head yet)
            for (let i = 1; i < snake.length; i++) {
                grid[snake[i].y][snake[i].x] = 'o';
            }

            // Draw head
            grid[snake[0].y][snake[0].x] = '@';

            let display = grid.map(row => row.join('')).join('\n');
            document.getElementById('game-container').textContent = display;
            document.getElementById('score').textContent = score;
            document.getElementById('cleared').textContent = cleared;
            
            let bodyStr = body.length > 0 ? body.join('') : '(empty)';
            document.getElementById('body-display').textContent = `Body: ${bodyStr}`;
        }

        function gameLoop() {
            update();
            if (gameActive) {
                setTimeout(gameLoop, GAME_SPEED);
            }
        }

        document.addEventListener('keydown', (e) => {
            if (!gameActive && !gameOver) return;
            
            switch(e.key) {
                case 'ArrowUp':
                    if (direction.y === 0) nextDirection = {x: 0, y: -1};
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    if (direction.y === 0) nextDirection = {x: 0, y: 1};
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                    if (direction.x === 0) nextDirection = {x: -1, y: 0};
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    if (direction.x === 0) nextDirection = {x: 1, y: 0};
                    e.preventDefault();
                    break;
            }
        });

        initGame();
    </script>
</body>
</html>
