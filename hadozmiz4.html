<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Snake Game</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #1a1a1a;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        .container {
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .settings {
            border: 2px solid #00ff00;
            padding: 15px;
            background-color: #000;
            min-width: 250px;
        }

        .setting-group {
            margin-bottom: 15px;
        }

        .setting-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .setting-group input,
        .setting-group select {
            width: 100%;
            padding: 5px;
            background-color: #1a1a1a;
            color: #00ff00;
            border: 1px solid #00ff00;
            font-family: 'Courier New', monospace;
            box-sizing: border-box;
        }

        #game-container {
            border: 2px solid #00ff00;
            padding: 10px;
            background-color: #000;
            line-height: 1.2;
            white-space: pre;
            font-size: 14px;
        }

        #stats {
            margin-top: 20px;
            text-align: left;
        }

        #body-display {
            margin-top: 10px;
            font-size: 12px;
            word-break: break-all;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #00ff00;
            color: #000;
            border: none;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            width: 100%;
        }

        button:hover {
            background-color: #00cc00;
        }

        .game-over {
            color: #ff0000;
            font-weight: bold;
            margin-top: 10px;
        }

        .game-active {
            color: #ffff00;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>🐍 ASCII Snake Game</h1>
    
    <div class="container">
        <div class="left-panel">
            <div class="settings">
                <div class="setting-group">
                    <label for="speed">Speed (1-5):</label>
                    <input type="range" id="speed" min="1" max="5" value="3">
                    <span id="speed-value">3</span>
                </div>

                <div class="setting-group">
                    <label for="difficulty">Difficulty (Letters A-?):</label>
                    <select id="difficulty">
                        <option value="3">A-C (Easy)</option>
                        <option value="5" selected>A-E (Normal)</option>
                        <option value="7">A-G (Hard)</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label>
                        <input type="checkbox" id="grid-toggle" checked>
                        Show Grid
                    </label>
                </div>

                <button onclick="startGame()">START NEW GAME</button>
            </div>

            <div id="stats">
                <div>Score: <span id="score">0</span></div>
                <div>Segments Cleared: <span id="cleared">0</span></div>
                <div id="body-display">Body: (empty)</div>
                <div id="status"></div>
            </div>
        </div>

        <div>
            <div id="game-container"></div>
        </div>
    </div>

    <script>
        const WIDTH = 40;
        const HEIGHT = 20;

        let gameState = {
            head: { x: 20, y: 10 },
            body: [],
            foods: [],
            direction: { x: 1, y: 0 },
            nextDirection: { x: 1, y: 0 },
            score: 0,
            cleared: 0,
            gameActive: false,
            gameOver: false,
            gameLoopId: null,
            availableLetters: 'ABCDE',
        };

        function startGame() {
            // Clear any existing game loop
            if (gameState.gameLoopId !== null) {
                clearTimeout(gameState.gameLoopId);
            }

            // Get settings
            const difficulty = parseInt(document.getElementById('difficulty').value);
            gameState.availableLetters = String.fromCharCode(...Array.from({length: difficulty}, (_, i) => 65 + i));

            // Reset game state
            gameState.head = { x: 20, y: 10 };
            gameState.body = [];
            gameState.foods = [];
            gameState.direction = { x: 1, y: 0 };
            gameState.nextDirection = { x: 1, y: 0 };
            gameState.score = 0;
            gameState.cleared = 0;
            gameState.gameActive = true;
            gameState.gameOver = false;

            // Spawn initial foods
            spawnFoods();
            render();

            document.getElementById('status').innerHTML = '<div class="game-active">Game Running...</div>';
            gameLoop();
        }

        function spawnFoods() {
            while (gameState.foods.length < 3) {
                let x = Math.floor(Math.random() * WIDTH);
                let y = Math.floor(Math.random() * HEIGHT);

                // Check if position is free
                if (canSpawnAt(x, y)) {
                    let letter = gameState.availableLetters[Math.floor(Math.random() * gameState.availableLetters.length)];
                    gameState.foods.push({ x, y, letter });
                }
            }
        }

        function canSpawnAt(x, y) {
            // Check head
            if (gameState.head.x === x && gameState.head.y === y) return false;

            // Check body
            for (let segment of gameState.body) {
                if (segment.x === x && segment.y === y) return false;
            }

            // Check foods
            for (let food of gameState.foods) {
                if (food.x === x && food.y === y) return false;
            }

            return true;
        }

        function update() {
            if (!gameState.gameActive) return;

            gameState.direction = gameState.nextDirection;

            // Calculate new head position
            let newHeadX = gameState.head.x + gameState.direction.x;
            let newHeadY = gameState.head.y + gameState.direction.y;

            // Check border collision
            if (newHeadX < 0 || newHeadX >= WIDTH || newHeadY < 0 || newHeadY >= HEIGHT) {
                endGame("You hit the border!");
                return;
            }

            // Check body collision
            for (let segment of gameState.body) {
                if (newHeadX === segment.x && newHeadY === segment.y) {
                    endGame("You crashed into yourself!");
                    return;
                }
            }

            // Move head
            gameState.head = { x: newHeadX, y: newHeadY };

            // Check food collision
            let foodEaten = false;
            for (let i = 0; i < gameState.foods.length; i++) {
                if (gameState.head.x === gameState.foods[i].x && gameState.head.y === gameState.foods[i].y) {
                    let letter = gameState.foods[i].letter;
                    gameState.body.unshift(letter);
                    gameState.score++;

                    // Check for 3 of the same letter
                    let letterCount = gameState.body.filter(l => l === letter).length;
                    if (letterCount === 3) {
                        gameState.body = gameState.body.filter(l => l !== letter);
                        gameState.cleared++;
                    }

                    gameState.foods.splice(i, 1);
                    spawnFoods();
                    foodEaten = true;
                    break;
                }
            }

            // If no food eaten, remove last body segment (move the snake)
            if (!foodEaten && gameState.body.length > 0) {
                gameState.body.pop();
            }

            render();
        }

        function endGame(message) {
            gameState.gameActive = false;
            gameState.gameOver = true;
            if (gameState.gameLoopId !== null) {
                clearTimeout(gameState.gameLoopId);
                gameState.gameLoopId = null;
            }
            document.getElementById('status').innerHTML = `<div class="game-over">${message}</div>`;
        }

        function render() {
            let grid = Array(HEIGHT).fill(0).map(() => Array(WIDTH).fill(' '));

            // Draw foods
            for (let food of gameState.foods) {
                grid[food.y][food.x] = food.letter;
            }

            // Draw body (as letters)
            for (let segment of gameState.body) {
                // Find first empty position for this letter
                for (let y = 0; y < HEIGHT; y++) {
                    for (let x = 0; x < WIDTH; x++) {
                        if (grid[y][x] === segment) {
                            grid[y][x] = segment;
                            break;
                        }
                    }
                }
            }

            // Draw body segments as 'o' (only if they don't have letters)
            let bodyPositions = new Set();
            for (let i = 1; i < gameState.body.length; i++) {
                // Just mark that there's a body segment here
                bodyPositions.add(i);
            }

            // Draw head last
            grid[gameState.head.y][gameState.head.x] = '@';

            // Convert grid to string
            let display = grid.map((row, y) => {
                if (document.getElementById('grid-toggle').checked) {
                    return row.join(' ');
                } else {
                    return row.join('');
                }
            }).join('\n');

            document.getElementById('game-container').textContent = display;
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('cleared').textContent = gameState.cleared;

            let bodyStr = gameState.body.length > 0 ? gameState.body.join('') : '(empty)';
            document.getElementById('body-display').textContent = `Body: ${bodyStr}`;
        }

        function gameLoop() {
            update();
            if (gameState.gameActive) {
                const speedMap = { 1: 300, 2: 200, 3: 150, 4: 100, 5: 50 };
                const speed = speedMap[parseInt(document.getElementById('speed').value)];
                gameState.gameLoopId = setTimeout(gameLoop, speed);
            }
        }

        document.getElementById('speed').addEventListener('change', (e) => {
            document.getElementById('speed-value').textContent = e.target.value;
        });

        document.addEventListener('keydown', (e) => {
            if (!gameState.gameActive) return;

            switch (e.key) {
                case 'ArrowUp':
                    if (gameState.direction.y === 0) gameState.nextDirection = { x: 0, y: -1 };
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    if (gameState.direction.y === 0) gameState.nextDirection = { x: 0, y: 1 };
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                    if (gameState.direction.x === 0) gameState.nextDirection = { x: -1, y: 0 };
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    if (gameState.direction.x === 0) gameState.nextDirection = { x: 1, y: 0 };
                    e.preventDefault();
                    break;
            }
        });

        // Update speed display on load
        document.getElementById('speed-value').textContent = document.getElementById('speed').value;
    </script>
</body>
</html>
