<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII SNEK</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #1a1a1a;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        .table-box {
            border: 2px solid #00ff00;
            background-color: #000;
        }
        
        .table-title {
            border-bottom: 1px solid #00ff00;
            padding: 5px 10px;
            font-weight: bold;
            background-color: #111;
        }
        
        #game-container {
            padding: 0;
            line-height: 1;
            white-space: pre;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 0;
            width: 336px;
            height: 281px;
            overflow: hidden;
            display: inline-block;
        }
        
        #new-game-btn {
            padding: 8px 15px;
            font-size: 14px;
            background-color: #00ff00;
            color: #000;
            border: 1px solid #00ff00;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            width: 336px;
            margin-top: 10px;
        }
        
        #new-game-btn:hover {
            opacity: 0.8;
        }
        
        .pad {
            display: grid;
            grid-template-columns: 50px 50px 50px;
            gap: 5px;
            margin-top: 20px;
        }
        
        .pad button {
            width: 50px;
            height: 50px;
            background-color: #00ff00;
            color: #000;
            border: 2px solid #00ff00;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        
        .pad button:hover {
            opacity: 0.8;
        }
        
        .pad button:active {
            opacity: 0.6;
        }
        
        .pad .empty {
            width: 50px;
            height: 50px;
        }
        
        #status {
            text-align: center;
            margin-top: 20px;
        }
        
        .game-over {
            color: #ff6600;
            font-weight: bold;
            font-size: 18px;
        }
        
        .game-won {
            color: #ffff00;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="table-box">
        <div class="table-title">ASCII SNEK</div>
        <div id="game-container"></div>
    </div>
    <button id="new-game-btn" onclick="startGame()">NEW GAME</button>
    
    <div class="pad" aria-label="D-pad">
        <div class="empty"></div>
        <button id="up" aria-label="Up">▲</button>
        <div class="empty"></div>

        <button id="left" aria-label="Left">◀</button>
        <div class="empty"></div>
        <button id="right" aria-label="Right">▶</button>

        <div class="empty"></div>
        <button id="down" aria-label="Down">▼</button>
        <div class="empty"></div>
    </div>
    
    <div id="status"></div>

    <script>
        const WIDTH = 40;
        const HEIGHT = 20;
        const AVAILABLE_LETTERS = 'abcdefghijk';

        let snake = [];
        let bodyLetters = [];
        let foods = [];
        let obstacles = [];
        let direction = {x: 1, y: 0};
        let nextDirection = {x: 1, y: 0};
        let score = 0;
        let lastObstacleScore = 0;
        let gameActive = false;
        let gameSpeed = 4;
        let gameDifficulty = 7;
        let gameLoopId = null;
        let gameColor = '#00ff00';
        let baseSpeed = 4;

        function startGame() {
            if (gameLoopId) clearTimeout(gameLoopId);

            snake = [{x: Math.floor(WIDTH / 2), y: Math.floor(HEIGHT / 2)}];
            bodyLetters = [];
            direction = {x: 1, y: 0};
            nextDirection = {x: 1, y: 0};
            score = 0;
            lastObstacleScore = 0;
            gameSpeed = baseSpeed;
            gameActive = true;
            foods = [];
            obstacles = [];

            document.getElementById('status').innerHTML = '';

            spawnFoods();
            render();
            gameLoop();
        }

        function isTooCloseToHead(x, y) {
            const headX = snake[0].x;
            const headY = snake[0].y;
            const distance = Math.max(Math.abs(x - headX), Math.abs(y - headY));
            return distance < 10;
        }

        function spawnObstacles(count) {
            let attempts = 0;
            while (obstacles.length < count && attempts < 100) {
                let x = Math.floor(Math.random() * WIDTH);
                let y = Math.floor(Math.random() * HEIGHT);

                if (!isOccupied(x, y) && !isTooCloseToHead(x, y) && !obstacles.some(o => o.x === x && o.y === y)) {
                    obstacles.push({x, y});
                }
                attempts++;
            }
        }

        function spawnFoods() {
            foods = [];
            const letters = AVAILABLE_LETTERS.substring(0, gameDifficulty);
            const positions = generateRandomPositions(5);
            for (let i = 0; i < 5; i++) {
                let randomLetter = letters[Math.floor(Math.random() * letters.length)];
                foods.push({x: positions[i].x, y: positions[i].y, letter: randomLetter});
            }
        }

        function generateRandomPositions(count) {
            let positions = [];
            let attempts = 0;
            while (positions.length < count && attempts < 100) {
                let x = Math.floor(Math.random() * WIDTH);
                let y = Math.floor(Math.random() * HEIGHT);

                if (!isOccupied(x, y) && !isTooCloseToHead(x, y) && !positions.some(p => p.x === x && p.y === y)) {
                    positions.push({x, y});
                }
                attempts++;
            }
            return positions;
        }

        function isOccupied(x, y) {
            for (let segment of snake) {
                if (segment.x === x && segment.y === y) return true;
            }
            for (let food of foods) {
                if (food.x === x && food.y === y) return true;
            }
            for (let obstacle of obstacles) {
                if (obstacle.x === x && obstacle.y === y) return true;
            }
            return false;
        }

        function checkAndRemoveConsecutive() {
            let removed = true;
            while (removed) {
                removed = false;
                for (let i = 0; i < bodyLetters.length - 2; i++) {
                    if (bodyLetters[i] === bodyLetters[i + 1] && bodyLetters[i + 1] === bodyLetters[i + 2]) {
                        bodyLetters.splice(i, 3);
                        score += 10;
                        
                        if (snake.length > bodyLetters.length + 1) {
                            snake.splice(bodyLetters.length + 1);
                        }
                        
                        removed = true;
                        break;
                    }
                }
            }
        }

        function update() {
            if (!gameActive) return;

            direction = nextDirection;

            let newHead = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // Check border collision FIRST - BEFORE moving
            if (newHead.x < 0 || newHead.x >= WIDTH || newHead.y < 0 || newHead.y >= HEIGHT) {
                endGame("You hit the border!");
                return;
            }

            // Check body collision (start from 1 to skip head)
            for (let i = 1; i < snake.length; i++) {
                if (newHead.x === snake[i].x && newHead.y === snake[i].y) {
                    endGame("You hit yourself!");
                    return;
                }
            }

            // Check obstacle collision
            for (let obstacle of obstacles) {
                if (newHead.x === obstacle.x && newHead.y === obstacle.y) {
                    endGame("You hit an obstacle!");
                    return;
                }
            }

            snake.unshift(newHead);

            // Check food collision
            let foodEaten = false;
            for (let i = 0; i < foods.length; i++) {
                if (newHead.x === foods[i].x && newHead.y === foods[i].y) {
                    let letter = foods[i].letter;
                    bodyLetters.push(letter);
                    score += 1;

                    checkAndRemoveConsecutive();

                    if (score >= 1000) {
                        endGameWon("YOU WIN! 1000 POINTS!");
                        return;
                    }

                    gameSpeed = baseSpeed + Math.floor(score / 100) * 0.5;

                    if (score - lastObstacleScore >= 25) {
                        spawnObstacles(obstacles.length + 1);
                        lastObstacleScore = score;
                    }

                    foods.splice(i, 1);
                    spawnFoods();
                    foodEaten = true;
                    break;
                }
            }

            // Remove tail only when food is eaten
            if (foodEaten) {
                if (snake.length > bodyLetters.length + 1) {
                    snake.pop();
                }
            } else {
                snake.pop();
            }

            render();
        }

        function endGame(message) {
            gameActive = false;
            document.getElementById('status').innerHTML = `<div class="game-over">${message}</div>`;
        }

        function endGameWon(message) {
            gameActive = false;
            document.getElementById('status').innerHTML = `<div class="game-won">${message}</div>`;
        }

        function render() {
            let grid = Array(HEIGHT).fill(null).map(() => Array(WIDTH).fill(' '));

            for (let obstacle of obstacles) {
                grid[obstacle.y][obstacle.x] = '#';
            }

            for (let food of foods) {
                grid[food.y][food.x] = food.letter;
            }

            for (let i = 0; i < bodyLetters.length; i++) {
                if (i + 1 < snake.length) {
                    let segment = snake[i + 1];
                    grid[segment.y][segment.x] = bodyLetters[i];
                }
            }

            grid[snake[0].y][snake[0].x] = '@';

            let display = grid.map(row => row.join('')).join('\n');
            document.getElementById('game-container').textContent = display;
        }

        function gameLoop() {
            update();
            if (gameActive) {
                const delay = 500 - (gameSpeed * 80);
                gameLoopId = setTimeout(gameLoop, delay);
            }
        }

        // Mobile D-Pad Controls
        function handleKeyDown(key) {
            if (!gameActive) return;
            
            switch(key) {
                case 'ArrowUp':
                    if (direction.y === 0) nextDirection = {x: 0, y: -1};
                    break;
                case 'ArrowDown':
                    if (direction.y === 0) nextDirection = {x: 0, y: 1};
                    break;
                case 'ArrowLeft':
                    if (direction.x === 0) nextDirection = {x: -1, y: 0};
                    break;
                case 'ArrowRight':
                    if (direction.x === 0) nextDirection = {x: 1, y: 0};
                    break;
            }
        }

        function handleKeyUp(key) {
            // No action needed on key up
        }

        const mapping = {
            up: 'ArrowUp',
            down: 'ArrowDown',
            left: 'ArrowLeft',
            right: 'ArrowRight'
        };

        function makeButton(id, key) {
            const btn = document.getElementById(id);
            let repeatId = null;

            function pressStart() {
                handleKeyDown(key);
                if (repeatId) clearInterval(repeatId);
                repeatId = setInterval(() => handleKeyDown(key), 100);
            }

            function pressEnd() {
                if (repeatId) { clearInterval(repeatId); repeatId = null; }
                handleKeyUp(key);
            }

            btn.addEventListener('pointerdown', e => { e.preventDefault(); pressStart(); });
            btn.addEventListener('pointerup', () => pressEnd());
            btn.addEventListener('pointercancel', () => pressEnd());
            btn.addEventListener('mouseleave', () => { if (repeatId) pressEnd(); });
            btn.addEventListener('click', e => e.preventDefault());

            btn.addEventListener('keydown', e => {
                if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); pressStart(); }
            });
            btn.addEventListener('keyup', e => {
                if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); pressEnd(); }
            });
        }

        makeButton('up', mapping.up);
        makeButton('down', mapping.down);
        makeButton('left', mapping.left);
        makeButton('right', mapping.right);

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                case 'ArrowDown':
                case 'ArrowLeft':
                case 'ArrowRight':
                    e.preventDefault();
                    handleKeyDown(e.key);
                    break;
            }
        });

        render();
    </script>
</body>
</html>
