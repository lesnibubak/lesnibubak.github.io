<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII SNEK</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #1a1a1a;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        #main-container {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            margin-bottom: 30px;
        }
        
        .table-box {
            border: 2px solid #00ff00;
            background-color: #000;
        }
        
        .table-title {
            border-bottom: 1px solid #00ff00;
            padding: 5px 10px;
            font-weight: bold;
            background-color: #111;
        }
        
        #game-container {
            padding: 0;
            line-height: 1;
            white-space: pre;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 0;
            width: 336px;
            height: 281px;
            overflow: hidden;
        }
        
        #options-panel {
            padding: 15px;
            min-width: 200px;
        }
        
        .option-group {
            margin: 10px 0;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .option-label {
            font-size: 12px;
            opacity: 0.8;
        }
        
        input[type="range"] {
            font-family: 'Courier New', monospace;
            background-color: #000;
            border: 1px solid currentColor;
            padding: 3px;
            width: 100%;
            height: 20px;
        }
        
        select {
            font-family: 'Courier New', monospace;
            background-color: #000;
            color: currentColor;
            border: 1px solid currentColor;
            padding: 5px;
            width: 100%;
        }
        
        input[type="range"]:disabled,
        select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        #new-game-btn {
            padding: 8px 15px;
            font-size: 14px;
            background-color: #00ff00;
            color: #000;
            border: 1px solid #00ff00;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            width: 100%;
        }
        
        #new-game-btn:hover {
            opacity: 0.8;
        }
        
        #score-display {
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            border-top: 1px solid currentColor;
            margin-top: 15px;
        }
        
        #status {
            text-align: center;
        }
        
        .game-over {
            color: #ff6600;
            font-weight: bold;
            font-size: 18px;
        }
        
        .game-won {
            color: #ffff00;
            font-weight: bold;
            font-size: 18px;
        }
        
        #rules-box {
            border: 2px solid currentColor;
            background-color: #000;
            padding: 15px;
            max-width: 300px;
            line-height: 1.6;
            font-size: 13px;
        }
        
        #rules-box .title {
            font-weight: bold;
            border-bottom: 1px solid currentColor;
            margin-bottom: 10px;
            padding-bottom: 5px;
        }
    </style>
</head>
<body>
    <div id="main-container">
        <div class="table-box">
            <div class="table-title">ASCII SNEK</div>
            <div id="game-container"></div>
        </div>
        
        <div>
            <div class="table-box">
                <div class="table-title">OPTIONS</div>
                <div id="options-panel">
                    <div class="option-group">
                        <div class="option-label">Speed</div>
                        <input type="range" id="speed" min="1" max="5" value="4">
                    </div>
                    
                    <div class="option-group">
                        <div class="option-label">Color</div>
                        <select id="color">
                            <option value="#00ff00">Green</option>
                            <option value="#00ccff">Cyan</option>
                            <option value="#ffff00">Yellow</option>
                            <option value="#ff00ff">Magenta</option>
                            <option value="#ffffff">White</option>
                        </select>
                    </div>
                    
                    <div class="option-group">
                        <div class="option-label">Difficulty</div>
                        <select id="difficulty">
                            <option value="3">A-C</option>
                            <option value="5">A-E</option>
                            <option value="7" selected>A-G</option>
                        </select>
                    </div>

                    <div class="option-group">
                        <div class="option-label">More Obstacles</div>
                        <select id="obstacles">
                            <option value="off">Off</option>
                        </select>
                    </div>
                    
                    <div class="option-group" style="margin-top: 15px;">
                        <button id="new-game-btn" onclick="startGame()">NEW GAME</button>
                    </div>
                    
                    <div id="score-display">Score: <span id="score">0</span>/1000</div>
                </div>
            </div>
            
            <div id="rules-box">
                <div class="title">RULES</div>
                <div>Connect three for 10 points and make them disappear</div>
                <div>An obstacle appears every 25 points</div>
                <div>Speed up at every 100 points</div>                
                <div style="margin-top: 10px; border-top: 1px solid currentColor; padding-top: 10px; font-weight: bold;">WIN: 1000 points</div>
            </div>
        </div>
    </div>
    
    <div id="status"></div>

    <script>
        const WIDTH = 40;
        const HEIGHT = 20;
        const AVAILABLE_LETTERS = 'abcdefghijk'; // a-k lowercase

        let snake = [];
        let bodyLetters = [];
        let foods = [];
        let obstacles = [];
        let direction = {x: 1, y: 0};
        let nextDirection = {x: 1, y: 0};
        let score = 0;
        let lastObstacleScore = 0;
        let gameActive = false;
        let gameOver = false;
        let gameSpeed = 4;
        let gameDifficulty = 7;
        let gameLoopId = null;
        let gameColor = '#00ff00';
        let baseSpeed = 4;
        let obstaclesEnabled = false;

        // Settings - disabled during game
        document.getElementById('speed').addEventListener('change', (e) => {
            if (!gameActive) {
                baseSpeed = parseInt(e.target.value);
                gameSpeed = baseSpeed;
            }
        });

        document.getElementById('difficulty').addEventListener('change', (e) => {
            if (!gameActive) {
                gameDifficulty = parseInt(e.target.value);
            }
        });

        document.getElementById('obstacles').addEventListener('change', (e) => {
            if (!gameActive) {
                obstaclesEnabled = e.target.value !== 'off';
            }
        });

        document.getElementById('color').addEventListener('change', (e) => {
            if (!gameActive) {
                gameColor = e.target.value;
                document.body.style.color = gameColor;
                
                // Update all elements
                document.querySelectorAll('.table-box, .table-title, select, input[type="range"], #rules-box').forEach(el => {
                    el.style.borderColor = gameColor;
                });
                
                // Update button with new color
                document.getElementById('new-game-btn').style.backgroundColor = gameColor;
                document.getElementById('new-game-btn').style.borderColor = gameColor;
                document.getElementById('new-game-btn').style.color = '#000';
            }
        });

        function startGame() {
            if (gameLoopId) clearTimeout(gameLoopId);

            snake = [{x: Math.floor(WIDTH / 2), y: Math.floor(HEIGHT / 2)}];
            bodyLetters = [];
            direction = {x: 1, y: 0};
            nextDirection = {x: 1, y: 0};
            score = 0;
            lastObstacleScore = 0;
            gameSpeed = baseSpeed;
            gameActive = true;
            gameOver = false;
            foods = [];
            obstacles = [];

            // Disable controls during game
            document.getElementById('speed').disabled = true;
            document.getElementById('difficulty').disabled = true;
            document.getElementById('obstacles').disabled = true;
            document.getElementById('color').disabled = true;

            document.getElementById('status').innerHTML = '';

            spawnFoods();
            render();
            gameLoop();
        }

        function endGameState() {
            // Re-enable controls after game ends
            document.getElementById('speed').disabled = false;
            document.getElementById('difficulty').disabled = false;
            document.getElementById('obstacles').disabled = false;
            document.getElementById('color').disabled = false;
        }

        function isTooCloseToHead(x, y) {
            // Check if position is within 10 character radius of head
            const headX = snake[0].x;
            const headY = snake[0].y;
            const distance = Math.max(Math.abs(x - headX), Math.abs(y - headY));
            return distance < 10;
        }

        function spawnObstacles(count) {
            let attempts = 0;
            while (obstacles.length < count && attempts < 100) {
                let x = Math.floor(Math.random() * WIDTH);
                let y = Math.floor(Math.random() * HEIGHT);

                if (!isOccupied(x, y) && !isTooCloseToHead(x, y) && !obstacles.some(o => o.x === x && o.y === y)) {
                    obstacles.push({x, y});
                }
                attempts++;
            }
        }

        function spawnFoods() {
            foods = [];
            const letters = AVAILABLE_LETTERS.substring(0, gameDifficulty);
            const positions = generateRandomPositions(5);
            for (let i = 0; i < 5; i++) {
                let randomLetter = letters[Math.floor(Math.random() * letters.length)];
                foods.push({x: positions[i].x, y: positions[i].y, letter: randomLetter});
            }
        }

        function generateRandomPositions(count) {
            let positions = [];
            let attempts = 0;
            while (positions.length < count && attempts < 100) {
                let x = Math.floor(Math.random() * WIDTH);
                let y = Math.floor(Math.random() * HEIGHT);

                if (!isOccupied(x, y) && !isTooCloseToHead(x, y) && !positions.some(p => p.x === x && p.y === y)) {
                    positions.push({x, y});
                }
                attempts++;
            }
            return positions;
        }

        function isOccupied(x, y) {
            // Check snake head and body
            for (let segment of snake) {
                if (segment.x === x && segment.y === y) return true;
            }
            // Check foods
            for (let food of foods) {
                if (food.x === x && food.y === y) return true;
            }
            // Check obstacles
            for (let obstacle of obstacles) {
                if (obstacle.x === x && obstacle.y === y) return true;
            }
            return false;
        }

        function checkAndRemoveConsecutive() {
            // Check for 3 consecutive identical letters and remove them
            let removed = true;
            while (removed) {
                removed = false;
                for (let i = 0; i < bodyLetters.length - 2; i++) {
                    if (bodyLetters[i] === bodyLetters[i + 1] && bodyLetters[i + 1] === bodyLetters[i + 2]) {
                        // Found 3 consecutive identical letters
                        bodyLetters.splice(i, 3);
                        score += 10; // 10 bonus points for 3 in a row
                        
                        // Remove corresponding snake segments
                        if (snake.length > bodyLetters.length + 1) {
                            snake.splice(bodyLetters.length + 1);
                        }
                        
                        removed = true;
                        break;
                    }
                }
            }
        }

        function update() {
            if (!gameActive) return;

            direction = nextDirection;

            let newHead = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // Check border collision
            if (newHead.x < 0 || newHead.x >= WIDTH || newHead.y < 0 || newHead.y >= HEIGHT) {
                endGame("You hit the border!");
                return;
            }

            // Check body collision (start from 1 to skip head)
            for (let i = 1; i < snake.length; i++) {
                if (newHead.x === snake[i].x && newHead.y === snake[i].y) {
                    endGame("You hit yourself!");
                    return;
                }
            }

            // Check obstacle collision
            for (let obstacle of obstacles) {
                if (newHead.x === obstacle.x && newHead.y === obstacle.y) {
                    endGame("You hit an obstacle!");
                    return;
                }
            }

            snake.unshift(newHead);

            // Check food collision
            let foodEaten = false;
            for (let i = 0; i < foods.length; i++) {
                if (newHead.x === foods[i].x && newHead.y === foods[i].y) {
                    let letter = foods[i].letter;
                    bodyLetters.push(letter);
                    score += 1; // 1 point per letter

                    // Check for 3 consecutive identical letters
                    checkAndRemoveConsecutive();

                    // Check win condition
                    if (score >= 1000) {
                        endGameWon("YOU WIN! 1000 POINTS!");
                        return;
                    }

                    // Speed up every 100 points
                    gameSpeed = baseSpeed + Math.floor(score / 100) * 0.5;

                    // Add obstacle every 25 points (always, regardless of More Obstacles setting)
                    if (score - lastObstacleScore >= 25) {
                        spawnObstacles(obstacles.length + 1);
                        lastObstacleScore = score;
                    }

                    foods.splice(i, 1);
                    spawnFoods();
                    foodEaten = true;
                    break;
                }
            }

            // Remove tail only when food is eaten
            if (foodEaten) {
                if (snake.length > bodyLetters.length + 1) {
                    snake.pop();
                }
            } else {
                snake.pop();
            }

            render();
        }

        function endGame(message) {
            gameActive = false;
            gameOver = true;
            endGameState();
            document.getElementById('status').innerHTML = `<div class="game-over">${message}</div>`;
        }

        function endGameWon(message) {
            gameActive = false;
            gameOver = true;
            endGameState();
            document.getElementById('status').innerHTML = `<div class="game-won">${message}</div>`;
        }

        function render() {
            let grid = Array(HEIGHT).fill(null).map(() => Array(WIDTH).fill(' '));

            // Draw obstacles (hashtags only)
            for (let obstacle of obstacles) {
                grid[obstacle.y][obstacle.x] = '#';
            }

            // Draw foods
            for (let food of foods) {
                grid[food.y][food.x] = food.letter;
            }

            // Draw body letters
            for (let i = 0; i < bodyLetters.length; i++) {
                if (i + 1 < snake.length) {
                    let segment = snake[i + 1];
                    grid[segment.y][segment.x] = bodyLetters[i];
                }
            }

            // Draw head
            grid[snake[0].y][snake[0].x] = '@';

            let display = grid.map(row => row.join('')).join('\n');
            document.getElementById('game-container').textContent = display;
            document.getElementById('score').textContent = score;
        }

        function gameLoop() {
            update();
            if (gameActive) {
                const delay = 500 - (gameSpeed * 80);
                gameLoopId = setTimeout(gameLoop, delay);
            }
        }

        document.addEventListener('keydown', (e) => {
            if (!gameActive) return;

            switch(e.key) {
                case 'ArrowUp':
                    if (direction.y === 0) nextDirection = {x: 0, y: -1};
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    if (direction.y === 0) nextDirection = {x: 0, y: 1};
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                    if (direction.x === 0) nextDirection = {x: -1, y: 0};
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    if (direction.x === 0) nextDirection = {x: 1, y: 0};
                    e.preventDefault();
                    break;
            }
        });

        // Initial render
        render();
    </script>
</body>
</html>
