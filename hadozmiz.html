<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Snake Game</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #1a1a1a;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        #main-container {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            margin-bottom: 30px;
        }
        
        .table-box {
            border: 2px solid #00ff00;
            background-color: #000;
        }
        
        .table-title {
            border-bottom: 1px solid #00ff00;
            padding: 5px 10px;
            font-weight: bold;
            background-color: #111;
        }
        
        #game-container {
            padding: 10px;
            line-height: 1.2;
            white-space: pre;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            min-width: 450px;
            min-height: 280px;
        }
        
        #options-panel {
            padding: 15px;
            min-width: 200px;
        }
        
        .option-group {
            margin: 10px 0;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .option-label {
            font-size: 12px;
            opacity: 0.8;
        }
        
        input[type="range"] {
            font-family: 'Courier New', monospace;
            background-color: #000;
            border: 1px solid currentColor;
            padding: 3px;
            width: 100%;
            height: 20px;
        }
        
        select {
            font-family: 'Courier New', monospace;
            background-color: #000;
            color: currentColor;
            border: 1px solid currentColor;
            padding: 5px;
            width: 100%;
        }
        
        input[type="range"]:disabled,
        select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        #new-game-btn {
            padding: 8px 15px;
            font-size: 14px;
            background-color: #00ff00;
            color: #000;
            border: 1px solid #00ff00;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            width: 100%;
        }
        
        #new-game-btn:hover {
            opacity: 0.8;
        }
        
        #score-display {
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            border-top: 1px solid currentColor;
            margin-top: 15px;
        }
        
        #status {
            text-align: center;
        }
        
        .game-over {
            color: #ff6600;
            font-weight: bold;
            font-size: 18px;
        }
        
        .game-won {
            color: #ffff00;
            font-weight: bold;
            font-size: 18px;
        }
        
        #rules-box {
            border: 2px solid currentColor;
            background-color: #000;
            padding: 15px;
            max-width: 300px;
            line-height: 1.6;
            font-size: 13px;
        }
        
        #rules-box .title {
            font-weight: bold;
            border-bottom: 1px solid currentColor;
            margin-bottom: 10px;
            padding-bottom: 5px;
        }
    </style>
</head>
<body>
    <div id="main-container">
        <div class="table-box">
            <div class="table-title">ASCII SNAKE</div>
            <div id="game-container"></div>
        </div>
        
        <div>
            <div class="table-box">
                <div class="table-title">OPTIONS</div>
                <div id="options-panel">
                    <div class="option-group">
                        <div class="option-label">Speed</div>
                        <input type="range" id="speed" min="1" max="5" value="4">
                    </div>
                    
                    <div class="option-group">
                        <div class="option-label">Color</div>
                        <select id="color">
                            <option value="#00ff00">Green</option>
                            <option value="#00ccff">Cyan</option>
                            <option value="#ffff00">Yellow</option>
                            <option value="#ff00ff">Magenta</option>
                            <option value="#ffffff">White</option>
                        </select>
                    </div>
                    
                    <div class="option-group">
                        <div class="option-label">Difficulty</div>
                        <select id="difficulty">
                            <option value="3">A-C</option>
                            <option value="5">A-E</option>
                            <option value="7" selected>A-G</option>
                        </select>
                    </div>

                    <div class="option-group">
                        <div class="option-label">More Obstacles</div>
                        <select id="obstacles">
                            <option value="off">Off</option>
                        </select>
                    </div>
                    
                    <div class="option-group" style="margin-top: 15px;">
                        <button id="new-game-btn" onclick="startGame()">NEW GAME</button>
                    </div>
                    
                    <div id="score-display">Score: <span id="score">0</span>/1000</div>
                </div>
            </div>
            
            <div id="rules-box">
                <div class="title">RULES</div>
                <div>Connect three for 10 points and make them disappear</div>
                <div>An obstacle appears every 25 points</div>
                <div>Speed up at every 100 points</div>                
                <div style="margin-top: 10px; border-top: 1px solid currentColor; padding-top: 10px; font-weight: bold;">WIN: 1000 points</div>
            </div>
        </div>
    </div>
    
    <div id="status"></div>

    <script>
        // --- config ---
const WIDTH = 40;
const HEIGHT = 20;
const AVAILABLE_LETTERS = 'abcdefghijk'; // a-k lowercase

// padding offsets in characters (ch)
const PAD_TOP = 1;
const PAD_LEFT = 1;
const PAD_RIGHT = 5;
const PAD_BOTTOM = 1;

// --- state ---
let snake = [];
let bodyLetters = [];
let foods = [];
let obstacles = [];
let direction = {x: 1, y: 0};
let nextDirection = {x: 1, y: 0};
let score = 0;
let lastObstacleScore = 0;
let gameActive = false;
let gameOver = false;
let gameSpeed = 4;
let gameDifficulty = 7;
let gameLoopId = null;
let gameColor = '#00ff00';
let baseSpeed = 4;
let obstaclesEnabled = false;

// Cached DOM
const gameContainer = document.getElementById('game-container');
const statusEl = document.getElementById('status');
const scoreEl = document.getElementById('score');
const speedEl = document.getElementById('speed');
const difficultyEl = document.getElementById('difficulty');
const obstaclesEl = document.getElementById('obstacles');
const colorEl = document.getElementById('color');
const newGameBtn = document.getElementById('new-game-btn');

// Utility: compute effective grid origin and size in pixels/chars if needed.
// IMPORTANT: this script treats WIDTH/HEIGHT as logical cells; visual padding is applied
// when rendering text by adding margins around the grid string so the JS coordinates
// match logical 0..WIDTH-1 and 0..HEIGHT-1 without shifting due to CSS padding.
// We therefore render the grid into the container's textContent with explicit
// left/right padding characters and top/bottom empty lines to reflect ch padding.

// Settings handlers
speedEl.addEventListener('change', (e) => {
    if (!gameActive) {
        baseSpeed = parseInt(e.target.value);
        gameSpeed = baseSpeed;
    }
});

difficultyEl.addEventListener('change', (e) => {
    if (!gameActive) {
        gameDifficulty = parseInt(e.target.value);
    }
});

obstaclesEl.addEventListener('change', (e) => {
    if (!gameActive) {
        obstaclesEnabled = e.target.value !== 'off';
    }
});

colorEl.addEventListener('change', (e) => {
    if (!gameActive) {
        gameColor = e.target.value;
        document.body.style.color = gameColor;
        document.querySelectorAll('.table-box, .table-title, select, input[type="range"], #rules-box').forEach(el => {
            el.style.borderColor = gameColor;
        });
        newGameBtn.style.backgroundColor = gameColor;
        newGameBtn.style.borderColor = gameColor;
        newGameBtn.style.color = '#000';
    }
});

function startGame() {
    if (gameLoopId) clearTimeout(gameLoopId);

    snake = [{x: Math.floor(WIDTH / 2), y: Math.floor(HEIGHT / 2)}];
    bodyLetters = [];
    direction = {x: 1, y: 0};
    nextDirection = {x: 1, y: 0};
    score = 0;
    lastObstacleScore = 0;
    gameSpeed = baseSpeed;
    gameActive = true;
    gameOver = false;
    foods = [];
    obstacles = [];

    // Disable controls during game
    speedEl.disabled = true;
    difficultyEl.disabled = true;
    obstaclesEl.disabled = true;
    colorEl.disabled = true;

    statusEl.innerHTML = '';

    spawnFoods();
    render();
    gameLoop();
}

function endGameState() {
    speedEl.disabled = false;
    difficultyEl.disabled = false;
    obstaclesEl.disabled = false;
    colorEl.disabled = false;
}

function spawnObstacles(count) {
    while (obstacles.length < count) {
        let x = Math.floor(Math.random() * WIDTH);
        let y = Math.floor(Math.random() * HEIGHT);

        if (!isOccupied(x, y) && !obstacles.some(o => o.x === x && o.y === y)) {
            obstacles.push({x, y});
        }
    }
}

function spawnFoods() {
    foods = [];
    const letters = AVAILABLE_LETTERS.substring(0, gameDifficulty);
    const positions = generateRandomPositions(5);
    for (let i = 0; i < 5; i++) {
        let randomLetter = letters[Math.floor(Math.random() * letters.length)];
        foods.push({x: positions[i].x, y: positions[i].y, letter: randomLetter});
    }
}

function generateRandomPositions(count) {
    let positions = [];
    while (positions.length < count) {
        let x = Math.floor(Math.random() * WIDTH);
        let y = Math.floor(Math.random() * HEIGHT);

        if (!isOccupied(x, y) && !positions.some(p => p.x === x && p.y === y)) {
            positions.push({x, y});
        }
    }
    return positions;
}

function isOccupied(x, y) {
    for (let segment of snake) {
        if (segment.x === x && segment.y === y) return true;
    }
    for (let food of foods) {
        if (food.x === x && food.y === y) return true;
    }
    for (let obstacle of obstacles) {
        if (obstacle.x === x && obstacle.y === y) return true;
    }
    return false;
}

function checkAndRemoveConsecutive() {
    let removed = true;
    while (removed) {
        removed = false;
        for (let i = 0; i < bodyLetters.length - 2; i++) {
            if (bodyLetters[i] === bodyLetters[i + 1] && bodyLetters[i + 1] === bodyLetters[i + 2]) {
                bodyLetters.splice(i, 3);
                score += 10;
                if (snake.length > bodyLetters.length + 1) {
                    snake.splice(bodyLetters.length + 1);
                }
                removed = true;
                break;
            }
        }
    }
}

function update() {
    if (!gameActive) return;

    direction = nextDirection;

    let newHead = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
    };

    // Check border collision (logical grid)
    if (newHead.x < 0 || newHead.x >= WIDTH || newHead.y < 0 || newHead.y >= HEIGHT) {
        endGame("You hit the border!");
        return;
    }

    for (let i = 1; i < snake.length; i++) {
        if (newHead.x === snake[i].x && newHead.y === snake[i].y) {
            endGame("You hit yourself!");
            return;
        }
    }

    for (let obstacle of obstacles) {
        if (newHead.x === obstacle.x && newHead.y === obstacle.y) {
            endGame("You hit an obstacle!");
            return;
        }
    }

    snake.unshift(newHead);

    let foodEaten = false;
    for (let i = 0; i < foods.length; i++) {
        if (newHead.x === foods[i].x && newHead.y === foods[i].y) {
            let letter = foods[i].letter;
            bodyLetters.push(letter);
            score += 1;
            checkAndRemoveConsecutive();
            if (score >= 1000) {
                endGameWon("YOU WIN! 1000 POINTS!");
                return;
            }
            gameSpeed = baseSpeed + Math.floor(score / 100) * 0.5;
            if (score - lastObstacleScore >= 25) {
                spawnObstacles(obstacles.length + 1);
                lastObstacleScore = score;
            }
            foods.splice(i, 1);
            spawnFoods();
            foodEaten = true;
            break;
        }
    }

    if (foodEaten) {
        if (snake.length > bodyLetters.length + 1) {
            snake.pop();
        }
    } else {
        snake.pop();
    }

    render();
}

function endGame(message) {
    gameActive = false;
    gameOver = true;
    endGameState();
    statusEl.innerHTML = `<div class="game-over">${message}</div>`;
}

function endGameWon(message) {
    gameActive = false;
    gameOver = true;
    endGameState();
    statusEl.innerHTML = `<div class="game-won">${message}</div>`;
}

function render() {
    // Build grid
    let grid = Array(HEIGHT).fill(null).map(() => Array(WIDTH).fill(' '));

    for (let obstacle of obstacles) {
        grid[obstacle.y][obstacle.x] = '#';
    }

    for (let food of foods) {
        grid[food.y][food.x] = food.letter;
    }

    for (let i = 0; i < bodyLetters.length; i++) {
        if (i + 1 < snake.length) {
            let segment = snake[i + 1];
            grid[segment.y][segment.x] = bodyLetters[i];
        }
    }

    grid[snake[0].y][snake[0].x] = '@';

    // Convert rows to strings
    const rowStrings = grid.map(row => row.join(''));

    // Apply left/right padding in characters by prefixing/suffixing spaces
    const leftPad = ' '.repeat(PAD_LEFT);
    const rightPad = ' '.repeat(PAD_RIGHT);
    const paddedRows = rowStrings.map(r => leftPad + r + rightPad);

    // Apply top/bottom padding as empty lines
    const emptyRow = ' '.repeat(PAD_LEFT + WIDTH + PAD_RIGHT);
    const topRows = Array(PAD_TOP).fill(emptyRow);
    const bottomRows = Array(PAD_BOTTOM).fill(emptyRow);

    const display = topRows.concat(paddedRows).concat(bottomRows).join('\n');

    // Set monospaced font via CSS elsewhere; here we only set textContent
    gameContainer.textContent = display;
    scoreEl.textContent = score;
}

function gameLoop() {
    update();
    if (gameActive) {
        const delay = Math.max(50, 500 - (gameSpeed * 80));
        gameLoopId = setTimeout(gameLoop, delay);
    }
}

// Keyboard handling (prevents reversing into self)
document.addEventListener('keydown', (e) => {
    if (!gameActive) return;

    switch(e.key) {
        case 'ArrowUp':
            if (direction.y === 0) nextDirection = {x: 0, y: -1};
            e.preventDefault();
            break;
        case 'ArrowDown':
            if (direction.y === 0) nextDirection = {x: 0, y: 1};
            e.preventDefault();
            break;
        case 'ArrowLeft':
            if (direction.x === 0) nextDirection = {x: -1, y: 0};
            e.preventDefault();
            break;
        case 'ArrowRight':
            if (direction.x === 0) nextDirection = {x: 1, y: 0};
            e.preventDefault();
            break;
    }
});

// Expose start button if present
if (newGameBtn) newGameBtn.addEventListener('click', startGame);

// Initial render
render();
    </script>
</body>
</html>
