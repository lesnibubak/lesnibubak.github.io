<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Snake Game</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #1a1a1a;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        #main-container {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            margin-bottom: 30px;
        }
        
        .table-box {
            border: 2px solid #00ff00;
            background-color: #000;
        }
        
        .table-title {
            border-bottom: 1px solid #00ff00;
            padding: 5px 10px;
            font-weight: bold;
            background-color: #111;
        }
        
        #game-container {
            padding: 10px;
            line-height: 1.2;
            white-space: pre;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            min-width: 450px;
            min-height: 280px;
        }
        
        #options-panel {
            padding: 15px;
            min-width: 200px;
        }
        
        .option-group {
            margin: 10px 0;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .option-label {
            font-size: 12px;
            opacity: 0.8;
        }
        
        input[type="range"] {
            font-family: 'Courier New', monospace;
            background-color: #000;
            border: 1px solid currentColor;
            padding: 3px;
            width: 100%;
            height: 20px;
        }
        
        select {
            font-family: 'Courier New', monospace;
            background-color: #000;
            color: currentColor;
            border: 1px solid currentColor;
            padding: 5px;
            width: 100%;
        }
        
        button {
            padding: 8px 15px;
            font-size: 14px;
            background-color: currentColor;
            color: #000;
            border: none;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            width: 100%;
        }
        
        button:hover {
            opacity: 0.8;
        }
        
        #score-display {
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            border-top: 1px solid currentColor;
            margin-top: 15px;
        }
        
        #status {
            text-align: center;
        }
        
        .game-over {
            color: #ff6600;
            font-weight: bold;
            font-size: 18px;
        }
        
        .game-won {
            color: #ffff00;
            font-weight: bold;
            font-size: 18px;
        }
        
        #rules-box {
            border: 2px solid currentColor;
            background-color: #000;
            padding: 15px;
            max-width: 300px;
            line-height: 1.6;
            font-size: 13px;
        }
        
        #rules-box .title {
            font-weight: bold;
            border-bottom: 1px solid currentColor;
            margin-bottom: 10px;
            padding-bottom: 5px;
        }
    </style>
</head>
<body>
    <div id="main-container">
        <div class="table-box">
            <div class="table-title">ASCII SNAKE</div>
            <div id="game-container"></div>
        </div>
        
        <div>
            <div class="table-box">
                <div class="table-title">OPTIONS</div>
                <div id="options-panel">
                    <div class="option-group">
                        <div class="option-label">Speed</div>
                        <input type="range" id="speed" min="1" max="5" value="3">
                    </div>
                    
                    <div class="option-group">
                        <div class="option-label">Color</div>
                        <select id="color">
                            <option value="#00ff00">Green</option>
                            <option value="#00ccff">Cyan</option>
                            <option value="#ffff00">Yellow</option>
                            <option value="#ff00ff">Magenta</option>
                            <option value="#ffffff">White</option>
                        </select>
                    </div>
                    
                    <div class="option-group">
                        <div class="option-label">Difficulty</div>
                        <select id="difficulty">
                            <option value="3">A-C</option>
                            <option value="5">A-E</option>
                            <option value="7" selected>A-G</option>
                        </select>
                    </div>
                    
                    <div class="option-group" style="margin-top: 15px;">
                        <button onclick="startGame()">NEW GAME</button>
                    </div>
                    
                    <div id="score-display">Score: <span id="score">0</span>/1000</div>
                </div>
            </div>
            
            <div id="rules-box">
                <div class="title">RULES</div>
                <div>+ 1 point per letter</div>
                <div>+ 10 points for 3 same letters</div>
                <div>Speed up at every 100 points</div>
                <div style="margin-top: 10px; border-top: 1px solid currentColor; padding-top: 10px; font-weight: bold;">WIN: 1000 points</div>
            </div>
        </div>
    </div>
    
    <div id="status"></div>

    <script>
        const WIDTH = 40;
        const HEIGHT = 20;
        const AVAILABLE_LETTERS = 'abcdefghijk'; // a-k lowercase

        let snake = [];
        let bodyLetters = [];
        let foods = [];
        let direction = {x: 1, y: 0};
        let nextDirection = {x: 1, y: 0};
        let score = 0;
        let gameActive = false;
        let gameOver = false;
        let gameSpeed = 3;
        let gameDifficulty = 7;
        let gameLoopId = null;
        let gameColor = '#00ff00';
        let baseSpeed = 3;

        // Settings
        document.getElementById('speed').addEventListener('change', (e) => {
            baseSpeed = parseInt(e.target.value);
            gameSpeed = baseSpeed;
        });

        document.getElementById('difficulty').addEventListener('change', (e) => {
            gameDifficulty = parseInt(e.target.value);
        });

        document.getElementById('color').addEventListener('change', (e) => {
            gameColor = e.target.value;
            document.body.style.color = gameColor;
            document.documentElement.style.setProperty('--game-color', gameColor);
            
            // Update all elements that use currentColor
            document.querySelectorAll('.table-box, .table-title, select, input[type="range"], button, #rules-box').forEach(el => {
                el.style.borderColor = gameColor;
            });
        });

        function startGame() {
            if (gameLoopId) clearTimeout(gameLoopId);

            snake = [{x: Math.floor(WIDTH / 2), y: Math.floor(HEIGHT / 2)}];
            bodyLetters = [];
            direction = {x: 1, y: 0};
            nextDirection = {x: 1, y: 0};
            score = 0;
            gameSpeed = baseSpeed;
            gameActive = true;
            gameOver = false;
            foods = [];

            document.getElementById('status').innerHTML = '';

            spawnFoods();
            render();
            gameLoop();
        }

        function spawnFoods() {
            foods = [];
            const letters = AVAILABLE_LETTERS.substring(0, gameDifficulty);
            const positions = generateRandomPositions(5);
            for (let i = 0; i < 5; i++) {
                let randomLetter = letters[Math.floor(Math.random() * letters.length)];
                foods.push({x: positions[i].x, y: positions[i].y, letter: randomLetter});
            }
        }

        function generateRandomPositions(count) {
            let positions = [];
            while (positions.length < count) {
                let x = Math.floor(Math.random() * WIDTH);
                let y = Math.floor(Math.random() * HEIGHT);

                if (!isOccupied(x, y) && !positions.some(p => p.x === x && p.y === y)) {
                    positions.push({x, y});
                }
            }
            return positions;
        }

        function isOccupied(x, y) {
            for (let segment of snake) {
                if (segment.x === x && segment.y === y) return true;
            }
            for (let food of foods) {
                if (food.x === x && food.y === y) return true;
            }
            return false;
        }

        function update() {
            if (!gameActive) return;

            direction = nextDirection;

            let newHead = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // Check border collision
            if (newHead.x < 0 || newHead.x >= WIDTH || newHead.y < 0 || newHead.y >= HEIGHT) {
                endGame("You hit the border!");
                return;
            }

            // Check body collision
            for (let segment of snake) {
                if (newHead.x === segment.x && newHead.y === segment.y) {
                    endGame("You hit yourself!");
                    return;
                }
            }

            snake.unshift(newHead);

            // Check food collision
            let foodEaten = false;
            for (let i = 0; i < foods.length; i++) {
                if (newHead.x === foods[i].x && newHead.y === foods[i].y) {
                    let letter = foods[i].letter;
                    bodyLetters.push(letter);
                    score += 1; // 1 point per letter

                    // Check for 3 of same letter
                    let count = bodyLetters.filter(l => l === letter).length;
                    if (count === 3) {
                        bodyLetters = bodyLetters.filter(l => l !== letter);
                        score += 10; // 10 bonus points for 3 same
                    }

                    // Check win condition
                    if (score >= 1000) {
                        endGameWon("YOU WIN! 1000 POINTS!");
                        return;
                    }

                    // Speed up every 100 points
                    gameSpeed = baseSpeed + Math.floor(score / 100) * 0.5;

                    foods.splice(i, 1);
                    spawnFoods();
                    foodEaten = true;
                    break;
                }
            }

            // Remove tail only when food is eaten
            if (foodEaten) {
                if (snake.length > bodyLetters.length + 1) {
                    snake.pop();
                }
            } else {
                snake.pop();
            }

            render();
        }

        function endGame(message) {
            gameActive = false;
            gameOver = true;
            document.getElementById('status').innerHTML = `<div class="game-over">${message}</div>`;
        }

        function endGameWon(message) {
            gameActive = false;
            gameOver = true;
            document.getElementById('status').innerHTML = `<div class="game-won">${message}</div>`;
        }

        function render() {
            let grid = Array(HEIGHT).fill(null).map(() => Array(WIDTH).fill(' '));

            // Draw foods
            for (let food of foods) {
                grid[food.y][food.x] = food.letter;
            }

            // Draw body letters
            for (let i = 0; i < bodyLetters.length; i++) {
                if (i + 1 < snake.length) {
                    let segment = snake[i + 1];
                    grid[segment.y][segment.x] = bodyLetters[i];
                }
            }

            // Draw head
            grid[snake[0].y][snake[0].x] = '@';

            let display = grid.map(row => row.join('')).join('\n');
            document.getElementById('game-container').textContent = display;
            document.getElementById('score').textContent = score;
        }

        function gameLoop() {
            update();
            if (gameActive) {
                const delay = 500 - (gameSpeed * 80);
                gameLoopId = setTimeout(gameLoop, delay);
            }
        }

        document.addEventListener('keydown', (e) => {
            if (!gameActive) return;

            switch(e.key) {
                case 'ArrowUp':
                    if (direction.y === 0) nextDirection = {x: 0, y: -1};
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    if (direction.y === 0) nextDirection = {x: 0, y: 1};
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                    if (direction.x === 0) nextDirection = {x: -1, y: 0};
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    if (direction.x === 0) nextDirection = {x: 1, y: 0};
                    e.preventDefault();
                    break;
            }
        });

        // Initial render
        render();
    </script>
</body>
</html>
